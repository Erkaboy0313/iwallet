name: Deploy

# Runs ONLY after the CI workflow completes successfully on main.
# This guarantees lint + tests passed before any code reaches production.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip if CI failed or was cancelled.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          # Deploy the exact SHA that CI tested — not just the current branch tip.
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node deps
        run: npm ci

      - name: Build Tailwind CSS
        run: npm run build:css

      - name: Rsync release to VPS
        run: |
          SHA=$(git rev-parse --short HEAD)
          rsync -avz --delete \
            --exclude '.git' --exclude '.venv' --exclude 'node_modules' \
            --exclude 'staticfiles' --exclude '__pycache__' \
            ./ "iwallet@${{ secrets.DEPLOY_HOST }}:/srv/iwallet/releases/${SHA}/"

      - name: Run deploy script on VPS
        run: |
          SHA=$(git rev-parse --short HEAD)
          ssh "iwallet@${{ secrets.DEPLOY_HOST }}" "bash /srv/iwallet/releases/${SHA}/deploy/scripts/deploy.sh ${SHA}"

      - name: Smoke test
        run: |
          curl -fsS "https://${{ secrets.DEPLOY_DOMAIN }}/healthz" || { echo "Healthcheck failed"; exit 1; }
