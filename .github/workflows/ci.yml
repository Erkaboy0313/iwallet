name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: iwallet
          POSTGRES_PASSWORD: iwallet_dev
          POSTGRES_DB: iwallet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U iwallet"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: ci-only-insecure-fake-key-for-tests-only-1234567890
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgres://iwallet:iwallet_dev@localhost:5432/iwallet_test
      REDIS_URL: redis://localhost:6379/0
      LOG_LEVEL: WARNING

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node deps
        run: npm ci

      - name: Build Tailwind CSS
        run: npm run build:css

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: djlint templates (format check)
        run: djlint . --check --extension html --profile=django

      - name: djlint templates (lint)
        run: djlint . --lint --extension html --profile=django

      - name: No multi-line {# #} Django comments
        run: python scripts/lint_no_multiline_django_comments.py

      - name: Run pytest with coverage
        run: pytest --cov=. --cov-report=term-missing --cov-fail-under=70
