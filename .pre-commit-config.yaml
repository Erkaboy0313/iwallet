repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: detect-private-key
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/djlint/djLint
    rev: v1.39.4
    hooks:
      - id: djlint-reformat-django
      - id: djlint-django

  # Block multi-line {# ... #} Django comments — Django {# #} is single-line
  # only; multi-line variants leak as literal body text. We've hit this three
  # times in v0.5; this hook makes the regression impossible.
  - repo: local
    hooks:
      - id: no-multiline-django-comments
        name: no multi-line {# ... #} Django comments
        entry: python scripts/lint_no_multiline_django_comments.py
        language: system
        types: [html]
        pass_filenames: false
