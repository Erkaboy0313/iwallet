{% comment %}
Daily quote card — UX v0.6 §2.4. Real 40x40 dismiss button so the × is
actually tappable; visible hit area on hover/focus via slate-100 background.
{% endcomment %}
{% if quote %}
    <div id="quote-card"
         class="iw-enter iw-enter-2"
         style="position: relative;
                margin-bottom: 16px;
                padding: 14px 50px 16px 16px;
                background: var(--color-surface);
                border: 1px solid var(--color-border);
                border-left: 2px solid var(--color-primary);
                border-radius: var(--radius-card-sm);
                box-shadow: var(--shadow-soft);
                transition: opacity var(--motion-standard) var(--ease-out)">
        <p style="margin: 0;
                  font-size: 14px;
                  line-height: 1.55;
                  font-style: italic;
                  color: var(--color-text-secondary)">«{{ quote.text_uz }}»</p>
        <p style="margin: 8px 0 0;
                  font-size: 12px;
                  color: var(--color-text-muted)">— {{ quote.author }}</p>
        <button type="button"
                aria-label="Kunlik iborani yashirish"
                hx-post="{% url 'quotes:hide_today' %}"
                hx-target="#quote-card"
                hx-swap="outerHTML"
                hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
                style="position: absolute;
                       top: 8px;
                       right: 8px;
                       width: 40px;
                       height: 40px;
                       padding: 0;
                       background: transparent;
                       border: 0;
                       border-radius: 9999px;
                       color: var(--color-text-muted);
                       cursor: pointer;
                       display: inline-flex;
                       align-items: center;
                       justify-content: center;
                       transition: background var(--motion-micro) var(--ease-out)"
                onmouseover="this.style.background='var(--color-surface-hi)'"
                onmouseout="this.style.background='transparent'">
            <svg width="16"
                 height="16"
                 fill="none"
                 stroke="currentColor"
                 stroke-width="2"
                 viewBox="0 0 24 24"
                 aria-hidden="true">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>
{% endif %}
