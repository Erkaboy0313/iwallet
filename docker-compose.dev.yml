services:
  postgres:
    image: postgres:16-alpine
    container_name: iwallet-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: iwallet
      POSTGRES_USER: iwallet
      POSTGRES_PASSWORD: iwallet_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iwallet"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: iwallet-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
