{% load static %}
<!DOCTYPE html>
<html lang="uz">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
        <meta name="theme-color" content="#FAFAF7">
        <meta name="robots" content="noindex,nofollow">
        <title>{% block title %}IWALLET{% endblock %}</title>
        <link rel="stylesheet" href="{% static 'css/tokens.css' %}">
        <link rel="stylesheet" href="{% static 'css/build.css' %}">
        <script src="https://telegram.org/js/telegram-web-app.js"></script>
        <script defer src="{% static 'js/htmx.min.js' %}"></script>
        <script defer src="{% static 'js/alpine.min.js' %}"></script>
    </head>
    <body x-data="{ toast: null }"
          @htmx:after-request.window="if ($event.detail.headers['HX-Trigger']) { const t = JSON.parse($event.detail.headers['HX-Trigger']); if (t.toast) toast = t.toast; setTimeout(() => toast = null, 3000); }">
        {% include 'core/_toast.html' %}
        <main id="app-main">
            {% block content %}{% endblock %}
        </main>
        {% include 'core/_nav.html' %}
        <script>
    // Telegram WebApp lifecycle bootstrap.
    if (window.Telegram && window.Telegram.WebApp) {
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();
    }

    // Telegram Desktop sometimes ships an empty Telegram.WebApp.initData while
    // still placing the payload in the URL fragment (#tgWebAppData=...). Fall
    // back to parsing the fragment so Desktop + Mobile both work. Pattern
    // borrowed from Eric's GYMOS project where it ran in production.
    function _getTelegramInitData() {
      var tg = window.Telegram && window.Telegram.WebApp;
      if (tg && tg.initData) return tg.initData;
      try {
        var hash = window.location.hash || "";
        var qs = hash.indexOf("#") === 0 ? hash.slice(1) : hash;
        var params = new URLSearchParams(qs);
        var fragmentInitData = params.get("tgWebAppData");
        if (fragmentInitData) return decodeURIComponent(fragmentInitData);
      } catch (e) { /* ignored */ }
      return "";
    }

    // Inject the resolved initData on every htmx request.
    document.addEventListener("htmx:configRequest", function (evt) {
      var initData = _getTelegramInitData();
      if (initData) {
        evt.detail.headers["X-Telegram-InitData"] = initData;
      }
    });
        </script>
    </body>
</html>
