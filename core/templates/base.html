{% load static %}
<!DOCTYPE html>
<html lang="uz">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
        <meta name="theme-color" content="#FAFAF7">
        <meta name="robots" content="noindex,nofollow">
        <title>{% block title %}IWALLET{% endblock %}</title>
        <link rel="stylesheet" href="{% static 'css/tokens.css' %}?v={% now 'U' %}">
        <link rel="stylesheet" href="{% static 'css/build.css' %}?v={% now 'U' %}">
        <script src="https://telegram.org/js/telegram-web-app.js"></script>
        <script defer src="{% static 'js/htmx.min.js' %}?v={% now 'U' %}"></script>
        <script defer src="{% static 'js/alpine.min.js' %}?v={% now 'U' %}"></script>
    </head>
    <body x-data="{ toast: null }"
          @htmx:after-request.window="if ($event.detail.headers['HX-Trigger']) { const t = JSON.parse($event.detail.headers['HX-Trigger']); if (t.toast) toast = t.toast; setTimeout(() => toast = null, 3000); }">
        {% include 'core/_toast.html' %}
        <main id="app-main">
            {% block content %}{% endblock %}
        </main>
        {% block bottom_nav %}
            {% include 'core/_nav.html' %}
        {% endblock %}
        <button id="iw-debug-toggle"
                type="button"
                onclick="(function(){var p=document.getElementById('iw-debug-panel');p.style.display=p.style.display==='block'?'none':'block';})()"
                style="position:fixed;
                       bottom:8px;
                       right:8px;
                       z-index:99999;
                       background:#dc2626;
                       color:#fff;
                       border:0;
                       padding:4px 8px;
                       border-radius:6px;
                       font:11px ui-monospace,Menlo,Consolas,monospace;
                       cursor:pointer;
                       opacity:.85">🔍 log</button>
        <div id="iw-debug-panel"
             style="display:none;
                    position:fixed;
                    bottom:40px;
                    left:8px;
                    right:8px;
                    max-height:55vh;
                    overflow-y:auto;
                    background:rgba(15,23,42,.96);
                    color:#e2e8f0;
                    font:11px ui-monospace,Menlo,Consolas,monospace;
                    padding:8px;
                    border-radius:8px;
                    z-index:99998;
                    white-space:pre-wrap;
                    word-break:break-word;
                    border:1px solid #334155">
            <div style="opacity:.5; margin-bottom:4px">[xato bo'lsa shu yer ochiladi avtomatik]</div>
        </div>
        <script>
        (function () {
            var panel = document.getElementById("iw-debug-panel");
            var toggle = document.getElementById("iw-debug-toggle");
            var errCount = 0;
            function log(tag, msg) {
                if (!panel) return;
                var t = new Date().toISOString().slice(11, 19);
                var line = document.createElement("div");
                line.textContent = "[" + t + "] " + tag + " " + msg;
                if (tag.indexOf("ERR") !== -1) {
                    line.style.color = "#fca5a5";
                    panel.style.display = "block";
                    errCount += 1;
                    toggle.textContent = "🔍 log (" + errCount + " xato)";
                    toggle.style.background = "#ef4444";
                }
                panel.appendChild(line);
                panel.scrollTop = panel.scrollHeight;
            }
            window._iwLog = log;
            window.addEventListener("error", function (e) {
                log("JS-ERR", (e.message || "?") + " @ " + (e.filename || "?") + ":" + (e.lineno || "?"));
            });
            window.addEventListener("unhandledrejection", function (e) {
                log("PROMISE-ERR", String(e.reason));
            });
            document.addEventListener("htmx:configRequest", function (e) {
                log("HX-REQ", (e.detail.verb || "?").toUpperCase() + " " + (e.detail.path || "?"));
            });
            document.addEventListener("htmx:afterRequest", function (e) {
                var x = e.detail.xhr;
                var redir = x.getResponseHeader && x.getResponseHeader("HX-Redirect");
                log("HX-RES", x.status + " " + (x.responseURL || "") + (redir ? " -> " + redir : ""));
            });
            document.addEventListener("htmx:responseError", function (e) {
                var x = e.detail.xhr;
                log("HX-ERR", x.status + " :: " + (x.responseText || "").slice(0, 200));
            });
            document.addEventListener("htmx:sendError", function () {
                log("HX-NET-ERR", "tarmoq xatosi");
            });
            log("BOOT", window.location.pathname + window.location.search);
            log("TG-SDK", window.Telegram ? "bor" : "yo'q");
            try {
                var tg = window.Telegram && window.Telegram.WebApp;
                if (tg) log("TG-INIT", "initData.len=" + (tg.initData || "").length + " platform=" + (tg.platform || "?"));
            } catch (e) { log("TG-ERR", String(e)); }
            log("COOKIE", document.cookie ? "bor (len=" + document.cookie.length + ")" : "yo'q");
        })();
        </script>
        <script>
        if (window.Telegram && window.Telegram.WebApp) {
            try { Telegram.WebApp.ready(); Telegram.WebApp.expand(); }
            catch (e) { window._iwLog && window._iwLog("TG-BOOT-ERR", String(e)); }
        }
        function _getTelegramInitData() {
            var tg = window.Telegram && window.Telegram.WebApp;
            if (tg && tg.initData) return tg.initData;
            try {
                var hash = window.location.hash || "";
                var qs = hash.indexOf("#") === 0 ? hash.slice(1) : hash;
                var fragment = new URLSearchParams(qs).get("tgWebAppData");
                if (fragment) return decodeURIComponent(fragment);
            } catch (e) { window._iwLog && window._iwLog("FRAG-ERR", String(e)); }
            return "";
        }
        document.addEventListener("htmx:configRequest", function (evt) {
            var initData = _getTelegramInitData();
            window._iwLog && window._iwLog("HX-HEADER", "X-Telegram-InitData.len=" + initData.length);
            if (initData) evt.detail.headers["X-Telegram-InitData"] = initData;
        });
        </script>
    </body>
</html>
