{% load static %}
<!DOCTYPE html>
<html lang="uz">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
        <meta name="theme-color" content="#0A0F0C">
        <meta name="robots" content="noindex,nofollow">
        <title>{% block title %}IWALLET{% endblock %}</title>
        <link rel="stylesheet" href="{% static 'css/tokens.css' %}?v={% now 'U' %}">
        <link rel="stylesheet" href="{% static 'css/build.css' %}?v={% now 'U' %}">
        <script src="https://telegram.org/js/telegram-web-app.js"></script>
        <script defer src="{% static 'js/htmx.min.js' %}?v={% now 'U' %}"></script>
        <script defer src="{% static 'js/alpine.min.js' %}?v={% now 'U' %}"></script>
    </head>
    <body x-data="{ toast: null }"
          @htmx:after-request.window="(function(){ var trig = $event.detail.xhr && $event.detail.xhr.getResponseHeader && $event.detail.xhr.getResponseHeader('HX-Trigger'); if (!trig) return; try { var t = JSON.parse(trig); if (t.toast) { toast = t.toast; setTimeout(function(){ toast = null; }, 3000); } } catch (e) { window._iwLog && window._iwLog('TRIG-ERR', String(e)); } })()">
        {% include 'core/_toast.html' %}
        <main id="app-main" style="padding-bottom: 96px;">
            {% block content %}{% endblock %}
        </main>
        {% block bottom_nav %}
            {% include 'core/_nav.html' %}
        {% endblock %}
        <button id="iw-debug-toggle"
                type="button"
                onclick="(function(){var p=document.getElementById('iw-debug-panel');p.style.display=p.style.display==='block'?'none':'block';})()"
                style="position:fixed;
                       bottom:8px;
                       right:8px;
                       z-index:99999;
                       background:var(--color-danger);
                       color:var(--color-bg);
                       border:0;
                       padding:4px 8px;
                       border-radius:8px;
                       font:11px ui-monospace,Menlo,Consolas,monospace;
                       cursor:pointer;
                       opacity:.9">🔍 log</button>
        <div id="iw-debug-panel"
             style="display:none;
                    position:fixed;
                    bottom:40px;
                    left:8px;
                    right:8px;
                    max-height:55vh;
                    overflow-y:auto;
                    background:var(--color-surface);
                    color:var(--color-text);
                    font:11px ui-monospace,Menlo,Consolas,monospace;
                    padding:8px;
                    border-radius:10px;
                    z-index:99998;
                    white-space:pre-wrap;
                    word-break:break-word;
                    border:1px solid var(--color-border-strong)">
            <div style="opacity:.5; margin-bottom:4px">[xato bo'lsa shu yer ochiladi avtomatik]</div>
        </div>
        <script>
        (function () {
            var panel = document.getElementById("iw-debug-panel");
            var toggle = document.getElementById("iw-debug-toggle");
            var errCount = 0;
            function log(tag, msg) {
                if (!panel) return;
                var t = new Date().toISOString().slice(11, 19);
                var line = document.createElement("div");
                line.textContent = "[" + t + "] " + tag + " " + msg;
                if (tag.indexOf("ERR") !== -1) {
                    line.style.color = "#FFB8B8";
                    panel.style.display = "block";
                    errCount += 1;
                    toggle.textContent = "🔍 log (" + errCount + " xato)";
                    toggle.style.background = "#FF6B6B";
                }
                panel.appendChild(line);
                panel.scrollTop = panel.scrollHeight;
            }
            window._iwLog = log;
            window.addEventListener("error", function (e) {
                log("JS-ERR", (e.message || "?") + " @ " + (e.filename || "?") + ":" + (e.lineno || "?"));
            });
            window.addEventListener("unhandledrejection", function (e) {
                log("PROMISE-ERR", String(e.reason));
            });
            document.addEventListener("htmx:configRequest", function (e) {
                log("HX-REQ", (e.detail.verb || "?").toUpperCase() + " " + (e.detail.path || "?"));
            });
            document.addEventListener("htmx:afterRequest", function (e) {
                var x = e.detail.xhr;
                var redir = x.getResponseHeader && x.getResponseHeader("HX-Redirect");
                log("HX-RES", x.status + " " + (x.responseURL || "") + (redir ? " -> " + redir : ""));
            });
            document.addEventListener("htmx:responseError", function (e) {
                var x = e.detail.xhr;
                // 422 is form validation (expected — server re-renders with field errors), not a real bug.
                var isRealErr = x.status >= 500 || x.status === 401 || x.status === 403 || x.status === 404;
                log(isRealErr ? "HX-ERR" : "HX-422", x.status + " :: " + (x.responseText || "").slice(0, 200));
            });
            document.addEventListener("htmx:sendError", function () {
                log("HX-NET-ERR", "tarmoq xatosi");
            });
            log("BOOT", window.location.pathname + window.location.search);
            log("TG-SDK", window.Telegram ? "bor" : "yo'q");
            try {
                var tg = window.Telegram && window.Telegram.WebApp;
                if (tg) log("TG-INIT", "initData.len=" + (tg.initData || "").length + " platform=" + (tg.platform || "?"));
            } catch (e) { log("TG-ERR", String(e)); }
            log("COOKIE", document.cookie ? "bor (len=" + document.cookie.length + ")" : "yo'q");
        })();
        </script>
        <script>
        if (window.Telegram && window.Telegram.WebApp) {
            try { Telegram.WebApp.ready(); Telegram.WebApp.expand(); }
            catch (e) { window._iwLog && window._iwLog("TG-BOOT-ERR", String(e)); }
        }
        function _getTelegramInitData() {
            var tg = window.Telegram && window.Telegram.WebApp;
            if (tg && tg.initData) return tg.initData;
            try {
                var hash = window.location.hash || "";
                var qs = hash.indexOf("#") === 0 ? hash.slice(1) : hash;
                var fragment = new URLSearchParams(qs).get("tgWebAppData");
                if (fragment) return decodeURIComponent(fragment);
            } catch (e) { window._iwLog && window._iwLog("FRAG-ERR", String(e)); }
            return "";
        }
        document.addEventListener("htmx:configRequest", function (evt) {
            var initData = _getTelegramInitData();
            window._iwLog && window._iwLog("HX-HEADER", "X-Telegram-InitData.len=" + initData.length);
            if (initData) evt.detail.headers["X-Telegram-InitData"] = initData;
        });
        // Back navigation helper — history.back() when possible, fallback to
        // the supplied URL when there's no in-app history (deep-link entry).
        window.iwBack = function (fallback) {
            try {
                if (window.history.length > 1 && document.referrer && new URL(document.referrer).origin === window.location.origin) {
                    window.history.back();
                    return;
                }
            } catch (e) {}
            window.location.href = fallback || "/app/home/";
        };
        // Tiny top-of-page progress strip — shows on full-page navigation
        // (clicks to <a>) and htmx requests, hidden when content settles.
        (function () {
            var bar = document.createElement("div");
            bar.id = "iw-pageload";
            bar.style.cssText = "position:fixed;top:0;left:0;height:2px;background:#9FF87C;width:0;z-index:99999;transition:width 200ms ease,opacity 200ms ease;opacity:0;pointer-events:none;box-shadow:0 0 6px #9FF87C";
            document.body.appendChild(bar);
            var timer;
            function start() {
                clearTimeout(timer);
                bar.style.opacity = "1";
                bar.style.width = "20%";
                setTimeout(function () { bar.style.width = "70%"; }, 150);
            }
            function done() {
                clearTimeout(timer);
                bar.style.width = "100%";
                timer = setTimeout(function () { bar.style.opacity = "0"; bar.style.width = "0"; }, 220);
            }
            document.addEventListener("htmx:beforeRequest", start);
            document.addEventListener("htmx:afterRequest", done);
            document.addEventListener("htmx:sendError", done);
            // Full-page nav — anchors not handled by htmx.
            document.addEventListener("click", function (e) {
                var a = e.target.closest("a[href]");
                if (!a) return;
                if (a.hasAttribute("hx-get") || a.hasAttribute("hx-post")) return;
                var href = a.getAttribute("href") || "";
                if (href.startsWith("#") || href.startsWith("javascript:") || a.target === "_blank") return;
                if (a.origin && a.origin !== window.location.origin) return;
                start();
            }, true);
            window.addEventListener("pageshow", done);
        })();
        </script>
    </body>
</html>
