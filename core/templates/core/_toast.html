{# Toast — server triggers via HX-Trigger header. v0.7 dark surface + neon/red text. #}
<div x-show="toast"
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0 -translate-y-2"
     x-transition:enter-end="opacity-100 translate-y-0"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     role="alert"
     aria-live="polite"
     style="display: none;
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            max-width: 400px;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 500;
            background: var(--color-surface);
            border: 1px solid var(--color-border-strong);
            box-shadow: var(--shadow-elevated);
            color: var(--color-text)"
     :style="toast && toast.type === 'success' ? 'border-color: rgba(159, 248, 124, 0.4); color: var(--color-primary)' : (toast && toast.type === 'error' ? 'border-color: rgba(255, 107, 107, 0.4); color: var(--color-danger)' : '')">
    <span x-text="toast && toast.message"></span>
</div>
