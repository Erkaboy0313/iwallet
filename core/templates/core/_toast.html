{# Toast — server triggers via HX-Trigger header: {"toast": {"type": "success", "message": "..."}}. UX-DR15, UX-DR23. #}
<div x-show="toast"
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0 -translate-y-2"
     x-transition:enter-end="opacity-100 translate-y-0"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed top-4 left-1/2 -translate-x-1/2 z-50 px-4 py-3 rounded-2xl shadow-md text-sm font-medium max-w-[400px]"
     :class="{ 'bg-emerald-100 text-emerald-800': toast && toast.type === 'success', 'bg-red-100 text-red-800': toast && toast.type === 'error', 'bg-slate-100 text-slate-800': toast && toast.type === 'info', }"
     role="alert"
     aria-live="polite"
     style="display: none">
    <span x-text="toast && toast.message"></span>
</div>
