{% comment %}
Surface card — dark v0.7. Token-driven so themes auto-propagate.
Usage:
    {% include 'core/components/_card.html' with body=card_body padding=20 %}
{% endcomment %}
<div style="background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card);
            padding: {{ padding|default:16 }}px;
            overflow: hidden">{{ body|safe }}</div>
