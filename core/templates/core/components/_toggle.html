{% comment %}
iOS-style toggle. Submits an htmx POST when clicked.
Usage:
    {% include 'core/components/_toggle.html' with name='enabled' on=quote_enabled post_url=toggle_url %}
{% endcomment %}
<form hx-post="{{ post_url }}"
      hx-swap="none"
      hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
      style="margin: 0">
    <input type="hidden"
           name="{{ name|default:'enabled' }}"
           value="{% if on %}0{% else %}1{% endif %}">
    <button type="submit"
            aria-label="{{ aria_label|default:'Almashtirish' }}"
            aria-pressed="{% if on %}true{% else %}false{% endif %}"
            style="display: inline-block;
                   width: 46px;
                   height: 28px;
                   border: 0;
                   border-radius: 14px;
                   cursor: pointer;
                   position: relative;
                   background: {% if on %}var(--color-primary){% else %}var(--color-surface-hi){% endif %};
                   box-shadow: {% if on %}0 0 12px rgba(159, 248, 124, 0.35){% else %}inset 0 0 0 1px var(--color-border){% endif %};
                   transition: background var(--motion-micro) var(--ease-out), box-shadow var(--motion-standard) var(--ease-out)">
        <span aria-hidden="true"
              style="position: absolute;
                     top: 3px;
                     left: {% if on %}21px{% else %}3px{% endif %};
                     width: 22px;
                     height: 22px;
                     border-radius: 9999px;
                     background: {% if on %}var(--color-primary-on){% else %}var(--color-text-secondary){% endif %};
                     box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
                     transition: left var(--motion-standard) var(--ease-spring), background var(--motion-micro) var(--ease-out)"></span>
    </button>
</form>
