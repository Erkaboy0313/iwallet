{% comment %}
Rounded pill chip. Used by filter tabs.
Usage:
    {% include 'core/components/_pill.html' with href=url label='Kirim' active=is_active %}
{% endcomment %}
<a href="{{ href }}"
   aria-pressed="{% if active %}true{% else %}false{% endif %}"
   style="display: inline-flex;
          align-items: center;
          padding: 8px 14px;
          border-radius: 9999px;
          font-size: 13px;
          font-weight: 600;
          text-decoration: none;
          white-space: nowrap;
          scroll-snap-align: start;
          {% if active %}background: var(--color-primary);
          color: var(--color-primary-on);
          box-shadow: 0 0 16px rgba(159, 248, 124, 0.35);
          {% else %}background: var(--color-surface-hi);
          color: var(--color-text-secondary);
          border: 1px solid var(--color-border);
          {% endif %} transition: background var(--motion-micro) var(--ease-out), box-shadow var(--motion-standard) var(--ease-out)">{{ label }}</a>
