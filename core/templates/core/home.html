{% extends 'base.html' %}
{% block title %}Uy — IWALLET{% endblock %}
{% block content %}
    <section class="px-5 pt-6">
        <h1 class="text-2xl font-semibold text-slate-900">Salom, {{ user.first_name }}!</h1>
        <p class="mt-2 text-sm text-slate-500">IWALLET ish maydoni tayyor. Tranzaksiya kiritish v0.1 da paydo bo'ladi.</p>
        <div class="mt-8 card-default">
            <p class="text-xs uppercase tracking-wider text-slate-500">Sof balans</p>
            <p class="amount mt-2 text-4xl font-bold text-slate-900">0 UZS</p>
            <p class="mt-3 text-xs text-slate-500">Ma'lumot to'planmoqda</p>
        </div>
        <div class="mt-6 grid grid-cols-2 gap-3">
            <button type="button"
                    class="btn-primary opacity-50 cursor-not-allowed"
                    disabled
                    aria-label="Ovoz bilan tranzaksiya — tez orada">🎤 Voice</button>
            <button type="button"
                    class="btn-secondary opacity-50 cursor-not-allowed"
                    disabled
                    aria-label="Qo'lda kiritish — tez orada">✏️ Qo'lda</button>
        </div>
    </section>
{% endblock %}
