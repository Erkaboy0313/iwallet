{% load core_extras %}
{% comment %}
Balance-display currency picker — 3 pills, neon active. v0.7 simplified.
Switching only affects how the Home balance hero is shown.
Transactions, history, reports stay in source currency.
{% endcomment %}
<form hx-post="{% url 'currencies:switch_display' %}"
      hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'
      hx-swap="none"
      style="display: inline-flex;
             align-items: center;
             gap: 4px;
             padding: 3px;
             border-radius: 9999px;
             background: var(--color-surface);
             border: 1px solid var(--color-border)">
    {% for code, _label in currency_choices %}
        <button type="submit"
                name="display_currency"
                value="{{ code }}"
                aria-label="Balansni {{ code }} da ko'rsatish"
                aria-pressed="{% if display_currency == code %}true{% else %}false{% endif %}"
                style="padding: 6px 12px;
                       border: 0;
                       border-radius: 9999px;
                       font-size: 12px;
                       font-weight: 700;
                       cursor: pointer;
                       transition: background var(--motion-micro) var(--ease-out), box-shadow var(--motion-standard) var(--ease-out);
                       {% if display_currency == code %}background: var(--color-primary);
                       color: var(--color-primary-on);
                       box-shadow: 0 0 12px rgba(159, 248, 124, 0.32);
                       {% else %}background: transparent;
                       color: var(--color-text-secondary);
                       {% endif %}">{{ code }}</button>
    {% endfor %}
</form>
