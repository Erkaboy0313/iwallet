{# Delete confirmation modal — rendered into the bottom sheet. #}
<div>
    <header class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-semibold text-slate-900">Kategoriyani o'chirish</h2>
        <button type="button"
                @click="sheet = null"
                class="text-slate-500 hover:text-slate-900 px-2 py-1"
                aria-label="Yopish">×</button>
    </header>
    <p class="text-sm text-slate-700 mb-2">
        <span class="text-2xl mr-2" aria-hidden="true">{{ category.emoji }}</span>
        <span class="font-medium">{{ category.name }}</span>
    </p>
    <p class="text-sm text-slate-600 mb-5">
        Bu kategoriyani o'chirasizmi? Eski tranzaksiyalardan biriktirilgan bo'lsa, ular "Boshqa" ga ko'chiriladi.
    </p>
    <form hx-post="{{ action_url }}"
          hx-target="#category-list"
          hx-swap="outerHTML"
          @htmx:after-request="if ($event.detail.xhr.status === 200) { sheet = null }"
          class="flex gap-2">
        {% csrf_token %}
        <button type="button"
                @click="sheet = null"
                class="flex-1 rounded-2xl border border-slate-200 py-3 text-sm font-medium text-slate-700">
            Bekor qilish
        </button>
        <button type="submit"
                class="flex-1 rounded-2xl bg-red-600 hover:bg-red-700 text-white py-3 text-sm font-medium"
                aria-label="O'chirishni tasdiqlash">Ha, o'chir</button>
    </form>
</div>
