{% extends 'base.html' %}
{% load core_extras %}
{% block title %}Qarzlar — IWALLET{% endblock %}
{% block content %}
    <section style="padding: 16px 20px 96px">
        <header style="display: flex;
                       align-items: center;
                       gap: 8px;
                       min-height: 44px;
                       margin-bottom: 16px">
            <a href="{% url 'core:home' %}"
               aria-label="Uyga qaytish"
               style="display: inline-flex;
                      align-items: center;
                      justify-content: center;
                      width: 44px;
                      height: 44px;
                      color: var(--color-text-secondary);
                      text-decoration: none">
                <svg width="22"
                     height="22"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="1.8"
                     viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                </svg>
            </a>
            <h1 style="margin: 0;
                       font-size: 18px;
                       font-weight: 600;
                       color: var(--color-text)">Qarzlar</h1>
        </header>
        {# Pill-pair segmented control. UX §6.3(1). #}
        <div role="tablist"
             aria-label="Qarz yo'nalishi"
             style="display: flex;
                    gap: 4px;
                    padding: 4px;
                    border-radius: 9999px;
                    background: #F1F5F9;
                    margin-bottom: 16px">
            <a hx-get="{% url 'debts:list' %}?tab=lent"
               hx-target="#debts-tab-panel"
               hx-swap="outerHTML"
               hx-push-url="true"
               href="{% url 'debts:list' %}?tab=lent"
               role="tab"
               aria-selected="{% if active_tab == 'lent' %}true{% else %}false{% endif %}"
               style="flex: 1;
                      text-align: center;
                      padding: 9px 12px;
                      border-radius: 9999px;
                      font-size: 13px;
                      font-weight: 600;
                      text-decoration: none;
                      transition: background var(--motion-micro) var(--ease-out);
                      {% if active_tab == 'lent' %}background: var(--color-surface);
                      color: var(--color-text);
                      box-shadow: var(--shadow-soft);
                      {% else %}background: transparent;
                      color: var(--color-text-secondary);
                      {% endif %}">Menga qarzdor</a>
            <a hx-get="{% url 'debts:list' %}?tab=borrowed"
               hx-target="#debts-tab-panel"
               hx-swap="outerHTML"
               hx-push-url="true"
               href="{% url 'debts:list' %}?tab=borrowed"
               role="tab"
               aria-selected="{% if active_tab == 'borrowed' %}true{% else %}false{% endif %}"
               style="flex: 1;
                      text-align: center;
                      padding: 9px 12px;
                      border-radius: 9999px;
                      font-size: 13px;
                      font-weight: 600;
                      text-decoration: none;
                      transition: background var(--motion-micro) var(--ease-out);
                      {% if active_tab == 'borrowed' %}background: var(--color-surface);
                      color: var(--color-text);
                      box-shadow: var(--shadow-soft);
                      {% else %}background: transparent;
                      color: var(--color-text-secondary);
                      {% endif %}">Men qarzdorman</a>
        </div>
        {% include 'debts/_tab.html' %}
        <div style="margin-top: 20px; text-align: center">
            <a href="{% url 'debts:create' %}"
               aria-label="Yangi qarz qo'shish"
               style="display: inline-block;
                      padding: 12px 20px;
                      border-radius: 12px;
                      background: linear-gradient(135deg, var(--color-primary-gradient-start) 0%, var(--color-primary-gradient-end) 100%);
                      color: #FFFFFF;
                      font-size: 14px;
                      font-weight: 600;
                      text-decoration: none;
                      box-shadow: var(--shadow-cta)">+ Yangi qarz</a>
        </div>
        <div id="close-form-slot"></div>
    </section>
{% endblock %}
