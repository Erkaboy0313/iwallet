{% extends 'base.html' %}
{% load core_extras %}
{% block title %}Qarzlar — IWALLET{% endblock %}
{% block content %}
    <section class="px-5 pt-6 pb-24">
        <header class="flex items-center gap-3 mb-4">
            <a href="{% url 'core:home' %}"
               class="text-slate-500 hover:text-slate-900 px-2 py-1"
               aria-label="Uyga qaytish">←</a>
            <h1 class="text-xl font-semibold text-slate-900">Qarzlar</h1>
        </header>
        <!-- Tab pills (htmx-swap target replaces inner #debts-tab-panel only) -->
        <div class="flex gap-2 mb-4" role="tablist" aria-label="Qarz yo'nalishi">
            <a hx-get="{% url 'debts:list' %}?tab=lent"
               hx-target="#debts-tab-panel"
               hx-swap="outerHTML"
               hx-push-url="true"
               href="{% url 'debts:list' %}?tab=lent"
               class="flex-1 text-center px-3 py-2 rounded-full text-sm font-medium {% if active_tab == 'lent' %}bg-emerald-600 text-white{% else %}bg-slate-100 text-slate-700{% endif %}"
               role="tab"
               aria-selected="{% if active_tab == 'lent' %}true{% else %}false{% endif %}">Menga qarzdor</a>
            <a hx-get="{% url 'debts:list' %}?tab=borrowed"
               hx-target="#debts-tab-panel"
               hx-swap="outerHTML"
               hx-push-url="true"
               href="{% url 'debts:list' %}?tab=borrowed"
               class="flex-1 text-center px-3 py-2 rounded-full text-sm font-medium {% if active_tab == 'borrowed' %}bg-emerald-600 text-white{% else %}bg-slate-100 text-slate-700{% endif %}"
               role="tab"
               aria-selected="{% if active_tab == 'borrowed' %}true{% else %}false{% endif %}">Men qarzdorman</a>
        </div>
        {% include 'debts/_tab.html' %}
        <div class="mt-6 text-center">
            <a href="{% url 'debts:create' %}"
               class="inline-block text-sm text-emerald-700 underline-offset-4 hover:underline"
               aria-label="Yangi qarz qo'shish">+ Yangi qarz</a>
        </div>
        <!-- htmx swap target for the close form bottom-sheet -->
        <div id="close-form-slot"></div>
    </section>
{% endblock %}
