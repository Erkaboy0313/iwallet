{% extends 'base.html' %}
{% block title %}O'chirish — IWALLET{% endblock %}
{% block content %}
    <section style="padding: 16px 20px 120px">
        <header style="display: flex;
                       align-items: center;
                       gap: 8px;
                       min-height: 44px;
                       margin-bottom: 16px">
            <a href="{% url 'recurring:list' %}"
               aria-label="Bekor qilib qaytish"
               style="display: inline-flex;
                      align-items: center;
                      justify-content: center;
                      width: 44px;
                      height: 44px;
                      color: var(--color-text-secondary);
                      text-decoration: none">
                <svg width="22"
                     height="22"
                     fill="none"
                     stroke="currentColor"
                     stroke-width="1.8"
                     viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
                </svg>
            </a>
            <h1 style="margin: 0;
                       font-size: 18px;
                       font-weight: 600;
                       color: var(--color-text)">O'chirish</h1>
        </header>
        <div style="background: var(--color-surface);
                    border: 1px solid var(--color-border);
                    border-radius: 14px;
                    padding: 20px;
                    margin-bottom: 20px">
            <p style="font-size: 16px;
                      font-weight: 600;
                      color: var(--color-text);
                      margin: 0 0 8px">{{ schedule.name }}</p>
            <p style="font-size: 13px;
                      color: var(--color-text-secondary);
                      margin: 0;
                      line-height: 1.5">
                Bu takrorlanuvchini o'chirsangiz, ortiq sizdan so'ramaydi.
                Lekin avval yaratilgan tranzaksiyalar saqlanib qoladi.
            </p>
        </div>
        <form method="post"
              action="{{ action_url }}"
              style="display: flex;
                     gap: 8px">
            {% csrf_token %}
            <a href="{% url 'recurring:list' %}"
               style="flex: 1;
                      padding: 12px 20px;
                      border: 1px solid var(--color-border);
                      border-radius: 14px;
                      background: var(--color-surface);
                      color: var(--color-text);
                      font-size: 15px;
                      font-weight: 600;
                      text-align: center;
                      text-decoration: none">Bekor</a>
            <button type="submit"
                    aria-label="O'chirishni tasdiqlash"
                    style="flex: 1;
                           padding: 12px 20px;
                           border: 0;
                           border-radius: 14px;
                           background: var(--color-danger);
                           color: white;
                           font-size: 15px;
                           font-weight: 700;
                           cursor: pointer">Ha, o'chir</button>
        </form>
    </section>
{% endblock %}
