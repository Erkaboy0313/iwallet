# IWALLET nginx server block.
# Install: copy to /etc/nginx/sites-available/iwallet, then symlink:
#   sudo ln -s /etc/nginx/sites-available/iwallet /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: run `sudo certbot --nginx -d iwallet.buildermode.uz` after this file is in place;
# certbot auto-adds HTTPS server block + redirect.

server {
    listen 80;
    listen [::]:80;
    server_name iwallet.buildermode.uz;

    # certbot manages HTTPS; before TLS is provisioned, plain HTTP works for verification.

    client_max_body_size 4M;  # voice audio uploads (Story 2.2 caps at 2MB)

    # Anonymous healthcheck — used by GitHub Actions deploy smoke test.
    location = /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Static assets served directly off disk.
    location /static/ {
        alias /srv/iwallet/current/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Telegram Bot webhook → bot service on :8001 (Epic 9).
    location /bot/webhook/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Default → WebApp uvicorn on :8000.
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Security headers (CSP is set by Django).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    server_tokens off;

    access_log /var/log/nginx/iwallet.access.log;
    error_log  /var/log/nginx/iwallet.error.log warn;
}
